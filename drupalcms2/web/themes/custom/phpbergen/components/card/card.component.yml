"$schema": "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Image card
group: Card
props:
  type: object
  required:
    - heading_text
  properties:
    color:
      type: string
      title: Color
      enum:
        - neutral
        - accent
        - brand1
        - brand2
        - brand3
      meta:enum:
        neutral: Neutral
        accent: Accent
        brand1: Brand 1
        brand2: Brand 2
        brand3: Brand 3
      default: neutral
      examples:
        - neutral
    variant:
      type: string
      title: Variant
      enum:
        - default
        - tinted
      meta:enum:
        default: Default
        tinted: Tinted
      default: default
      examples:
        - default
    size:
      type: string
      title: Size
      enum:
        - sm
        - md
        - lg
      meta:enum:
        sm: Small
        md: Medium
        lg: Large
      default: md
      examples:
        - md
    heading_text:
      type: string
      title: Heading
      examples:
        - "This is your card title"
    level:
      type: number
      title: Heading level
      enum:
        - 2
        - 3
        - 4
        - 5
      default: 3
      examples:
        - 3
    url:
      type: string
      title: Link
      format: uri-reference
    media:
      $ref: json-schema-definitions://canvas.module/image
      title: Image
      type: object
      examples:
        - src: "assets/jj-ying-8bghKxNU1j0-unsplash.jpg"
          width: 1200
          height: 900
          alt: "Photo by jjying: https://unsplash.com/photos/purple-and-blue-light-digital-wallpaper-8bghKxNU1j0"
    text:
      type: string
      title: Description
      pattern: "(.|\\r?\\n)*"
      examples:
        - "Quaerat laborum rerum dolores dolores dolor qui."
